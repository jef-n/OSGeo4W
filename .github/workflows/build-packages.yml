jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: "Build packages"
        shell: cmd
        env:
          OSGEO4W_SKIP_TESTS: 1
          OSGEO4W_BUILD_RDEPS: 1
          OSGEO4W_SKIP_MASTER_REPO: 0
          OSGEO4W_CONTINUE_BUILD: 1
          OSGEO4W_SKIP_UPLOAD: 1
          # O4W_REPO: benoitdm-oslandia/OSGeo4W
          O4W_GIT_REPO: benoitdm-oslandia/OSGeo4W
          O4W_GIT_BRANCH: ${{ github.ref }}
        run: |
          # curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/%O4W_REPO%/master/bootstrap.cmd>bootstrap.cmd
          # curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/%O4W_REPO%/master/bootstrap.sh>bootstrap.sh
          call bootstrap.cmd 'qgis-dev'

      - uses: actions/upload-artifact@v4
        with:
          name: osgeo4w-repo
          path: x86_64/
          retention-days: 1

      - name: "Create MSI"
        shell: cmd
        if: ${{ github.event.inputs.buildmsi == '1' }}
        run: |
          path %CD%\cygwin\bin;%CD%\cygwin\usr\bin;%WINDIR%\system32
          bash scripts/msis.sh %BUILT_PKGS%

      - uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.buildmsi == '1' }}
        with:
          name: msi
          path: |
            tmp/packages/*.msi
            tmp/packages/*.sha256sum
          retention-days: 1

